                    enum: []
                  message:
                    type: string
                    example: '<error message>'
                    description: 'A human-readable message'
                    enum: []
                  data:
                    type: string
                    example: null
                    description: 'The participant user object or null'
                    enum: []
      tags:
        - PBAC
