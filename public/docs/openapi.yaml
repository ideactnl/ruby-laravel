openapi: 3.0.3
info:
  title: 'RubyNU API Documentation'
  description: 'Welcome to the RubyNU API documentation!'
  version: 1.0.0
servers:
  -
    url: 'http://localhost'
tags:
  -
    name: Auth
    description: "\nAuthentication and user management endpoints."
  -
    name: PBAC
    description: 'Endpoints related to PBAC records and participant management.'
paths:
  /api/v1/register:
    post:
      summary: 'Register a new user.'
      operationId: registerANewUser
      description: 'Registers a user with a registration number, PIN, and agreement to share data for research.'
      parameters: []
      responses:
        201:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: "{\n  \"success\": true,\n  \"message\": \"Registration successful\",\n  \"data\": {\n    \"user\": { \"id\": 1, \"registration_number\": \"user123\", ... },\n    \"access_token\": \"1|abcdef...\"\n  }\n}"
        400:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Registration failed: <error message>'
                  data: null
                properties:
                  success:
                    type: boolean
                    example: false
                    description: 'Whether the request was successful'
                    enum: []
                  message:
                    type: string
                    example: 'Registration failed: <error message>'
                    description: 'A human-readable message'
                    enum: []
                  data:
                    type: string
                    example: null
                    description: 'The user and access token or null'
                    enum: []
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                registration_number:
                  type: string
                  description: 'The unique registration number for the user.'
                  example: user123
                  nullable: false
                pin:
                  type: string
                  description: 'The PIN code for mobile login (min 6 chars).'
                  example: '123456'
                  nullable: false
                opt_in_for_research:
                  type: boolean
                  description: 'Must be true to register.'
                  example: true
                  nullable: false
              required:
                - registration_number
                - pin
                - opt_in_for_research
      security: []
  /api/v1/login:
    post:
      summary: 'Login (PIN-based)'
      operationId: loginPINBased
      description: 'Authenticates a user using registration number and PIN. Returns a Sanctum Bearer access_token for API access.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: "{\n  \"success\": true,\n  \"message\": \"Login successful\",\n  \"data\": {\n    \"user\": { ... },\n    \"access_token\": \"1|abcdef...\"\n  }\n}"
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Invalid credentials'
                  data: null
                properties:
                  success:
                    type: boolean
                    example: false
                    description: 'Whether the request was successful'
                    enum: []
                  message:
                    type: string
                    example: 'Invalid credentials'
                    description: 'A human-readable message'
                    enum: []
                  data:
                    type: string
                    example: null
                    description: 'The user and access token or null'
                    enum: []
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                registration_number:
                  type: string
                  description: "The user's registration number."
                  example: user123
                  nullable: false
                pin:
                  type: string
                  description: "The user's PIN."
                  example: '123456'
                  nullable: false
              required:
                - registration_number
                - pin
      security: []
  /api/v1/profile:
    patch:
      summary: 'Update user profile (toggles, password)'
      operationId: updateUserProfiletogglesPassword
      description: "Updates the authenticated user's profile toggles and/or password. Password change requires correct PIN.\n\n**Requires authentication via Bearer token in the Authorization header.**"
      parameters: []
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: "{\n  \"success\": true,\n  \"message\": \"Profile updated successfully\",\n  \"data\": { \"user\": { ... } }\n}"
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: Unauthenticated.
                  data: null
                properties:
                  success:
                    type: boolean
                    example: false
                    description: 'Whether the request was successful'
                    enum: []
                  message:
                    type: string
                    example: Unauthenticated.
                    description: 'A human-readable message'
                    enum: []
                  data:
                    type: string
                    example: null
                    description: 'The updated user or null'
                    enum: []
        403:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Invalid pin'
                  data: null
                properties:
                  success:
                    type: boolean
                    example: false
                    description: 'Whether the request was successful'
                    enum: []
                  message:
                    type: string
                    example: 'Invalid pin'
                    description: 'A human-readable message'
                    enum: []
                  data:
                    type: string
                    example: null
                    description: 'The updated user or null'
                    enum: []
      tags:
        - Auth
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                enable_data_sharing:
                  type: boolean
                  description: 'optional Enable or disable data sharing.'
                  example: true
                  nullable: true
                opt_in_for_research:
                  type: boolean
                  description: 'optional Opt in or out of research participation.'
                  example: false
                  nullable: true
                password:
                  type: string
                  description: 'optional New password (min 6 chars).'
                  example: mysecurepassword
                  nullable: true
                pin:
                  type: string
                  description: "optional The user's PIN (required if changing password)."
                  example: '123456'
                  nullable: false
  /api/v1/logout:
    post:
      summary: 'Logout (revoke token)'
      operationId: logoutrevokeToken
      description: "Logs out the authenticated user by revoking the current Sanctum Bearer token.\n\n**Requires authentication via Bearer token in the Authorization header.**"
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Logged out successfully'
                  data: null
                properties:
                  success:
                    type: boolean
                    example: true
                    description: 'Whether the request was successful'
                    enum: []
                  message:
                    type: string
                    example: 'Logged out successfully'
                    description: 'A human-readable message'
                    enum: []
                  data:
                    type: string
                    example: null
                    description: 'null Always null for this endpoint'
                    enum: []
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: Unauthenticated.
                  data: null
                properties:
                  success:
                    type: boolean
                    example: false
                    description: 'Whether the request was successful'
                    enum: []
                  message:
                    type: string
                    example: Unauthenticated.
                    description: 'A human-readable message'
                    enum: []
                  data:
                    type: string
                    example: null
                    description: 'null Always null for this endpoint'
                    enum: []
      tags:
        - Auth
  /api/v1/login-logs:
    post:
      summary: 'Get login logs for a registration number.'
      operationId: getLoginLogsForARegistrationNumber
      description: 'Returns login logs for the given registration number.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Logs retrieved successfully.'
                  data:
                    -
                      id: 1
                      registration_number: user123
                      login_at: '2025-07-02T11:00:00'
                properties:
                  success:
                    type: boolean
                    example: true
                    description: 'Whether the request was successful'
                    enum: []
                  message:
                    type: string
                    example: 'Logs retrieved successfully.'
                    description: 'A human-readable message'
                    enum: []
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        registration_number: user123
                        login_at: '2025-07-02T11:00:00'
                    description: 'array|null The login logs or null'
                    enum: []
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        registration_number:
                          type: string
                          example: user123
                        login_at:
                          type: string
                          example: '2025-07-02T11:00:00'
        404:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'No logs found for this registration number.'
                  data: null
                properties:
                  success:
                    type: boolean
                    example: false
                    description: 'Whether the request was successful'
                    enum: []
                  message:
                    type: string
                    example: 'No logs found for this registration number.'
                    description: 'A human-readable message'
                    enum: []
                  data:
                    type: string
                    example: null
                    description: 'array|null The login logs or null'
                    enum: []
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                registration_number:
                  type: string
                  description: 'The registration number.'
                  example: user123
                  nullable: false
              required:
                - registration_number
      security: []
  /api/v1/pbac/filter:
    get:
      summary: 'Filter PBAC records for the authenticated user by day, month, and/or year.'
      operationId: filterPBACRecordsForTheAuthenticatedUserByDayMonthAndorYear
      description: '**Requires authentication via Bearer token in the Authorization header.**'
      parameters:
        -
          in: query
          name: day
          description: 'optional The day to filter.'
          example: 3
          required: false
          schema:
            type: integer
            description: 'optional The day to filter.'
            example: 3
            nullable: false
        -
          in: query
          name: month
          description: 'optional The month to filter.'
          example: 7
          required: false
          schema:
            type: integer
            description: 'optional The month to filter.'
            example: 7
            nullable: false
        -
          in: query
          name: year
          description: 'optional The year to filter.'
          example: 2025
          required: false
          schema:
            type: integer
            description: 'optional The year to filter.'
            example: 2025
            nullable: false
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: "{\n  \"success\": true,\n  \"message\": \"PBAC records retrieved successfully.\",\n  \"data\": [ { \"ReportedDate\": \"2025-07-01\", ... } ]\n}"
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Authentication required. Please provide a valid Bearer token.'
                  data: null
                properties:
                  success:
                    type: boolean
                    example: false
                    description: 'Whether the request was successful'
                    enum: []
                  message:
                    type: string
                    example: 'Authentication required. Please provide a valid Bearer token.'
                    description: 'A human-readable message'
                    enum: []
                  data:
                    type: string
                    example: null
                    description: 'array|null The list of PBAC records or null'
                    enum: []
      tags:
        - PBAC
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                day:
                  type: integer
                  description: ''
                  example: 16
                  nullable: true
                month:
                  type: integer
                  description: ''
                  example: 16
                  nullable: true
                year:
                  type: integer
                  description: ''
                  example: 16
                  nullable: true
  /api/v1/pbac/check:
