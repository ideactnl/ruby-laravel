name: Deploy Application

on:
  push:
    branches: [main, staging, development]
  pull_request:
    branches: [main, staging, development]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[skip test]'))
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: ruby_testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, mysql, gd, zip, bcmath, soap, intl, exif, iconv
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          composer install --prefer-dist --no-progress --no-suggest
          npm ci

      - name: Prepare Laravel Application
        run: |
          cp .env.example .env
          php artisan key:generate
          npm run build

      - name: Run Tests
        run: |
          composer stan
          composer lint
          php artisan test --env=testing

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip deploy]')
    environment: STAGING
    concurrency: 
      group: staging_deployment
      cancel-in-progress: false
    
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            # Set environment variables
            export PROJECT_PATH="${{ secrets.PATH }}/ruby-staging"
            export BACKUP_DIR="${{ secrets.PATH }}/ruby_staging_backups"
            export APP_ENV="${{ vars.APP_ENV || 'staging' }}"
            export APP_DEBUG="${{ vars.APP_DEBUG || 'true' }}"
            export APP_URL="${{ vars.APP_URL || 'http://ruby-staging.ideact-server.nl' }}"
            export DB_DATABASE="${{ vars.DB_DATABASE || 'ruby_staging' }}"
            export QUEUE_CONNECTION="${{ vars.QUEUE_CONNECTION || 'database' }}"
            export LOG_LEVEL="${{ vars.LOG_LEVEL || 'debug' }}"
            export MAINTENANCE_SECRET="${{ secrets.MAINTENANCE_SECRET }}"
            
            # Run deployment script
            cd "$PROJECT_PATH"
            chmod +x .github/scripts/deploy-staging.sh
            ./.github/scripts/deploy-staging.sh

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: PRODUCTION
    concurrency: 
      group: production_deployment
      cancel-in-progress: false
    
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            # Set environment variables
            export PROJECT_PATH="${{ secrets.PATH }}/ruby"
            export BACKUP_DIR="${{ secrets.PATH }}/ruby_backups"
            export APP_ENV="${{ vars.APP_ENV || 'production' }}"
            export APP_DEBUG="${{ vars.APP_DEBUG || 'false' }}"
            export APP_URL="${{ vars.APP_URL || 'http://ruby.ideact-server.nl' }}"
            export DB_DATABASE="${{ vars.DB_DATABASE || 'ruby_production' }}"
            export QUEUE_CONNECTION="${{ vars.QUEUE_CONNECTION || 'database' }}"
            export LOG_LEVEL="${{ vars.LOG_LEVEL || 'error' }}"
            export MAINTENANCE_SECRET="${{ secrets.MAINTENANCE_SECRET }}"
            
            # Run deployment script
            cd "$PROJECT_PATH"
            chmod +x .github/scripts/deploy-production.sh
            ./.github/scripts/deploy-production.sh
