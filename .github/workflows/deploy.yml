name: Deploy Application

on:
  push:
    branches: [main, staging, development]
  pull_request:
    branches: [main, staging, development]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[skip test]'))

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, mysql, gd, zip, bcmath, soap, intl, exif, iconv
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          composer install --prefer-dist --no-progress --no-interaction
          npm ci

      - name: Prepare Laravel Application
        run: |
          cp .env.example .env
          php artisan key:generate
          npm run build

      - name: Run Tests
        run: |
          composer stan
          composer lint
          php artisan test --env=testing

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip deploy]')
    environment: STAGING
    concurrency: 
      group: staging_deployment
      cancel-in-progress: false
    
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            # App environment variables
            export PROJECT_PATH="${{ secrets.PATH }}/ruby-staging"
            export BACKUP_DIR="${{ secrets.BACKUP_PATH }}/site/staging"
            export APP_ENV="${{ vars.APP_ENV || 'staging' }}"
            export APP_DEBUG="${{ vars.APP_DEBUG || 'true' }}"
            export APP_URL="${{ vars.APP_URL || 'http://ruby-staging.ideact-server.nl' }}"
            export DB_DATABASE="${{ vars.DB_DATABASE || 'ruby_staging' }}"
            export QUEUE_CONNECTION="${{ vars.QUEUE_CONNECTION || 'database' }}"
            export LOG_LEVEL="${{ vars.LOG_LEVEL || 'debug' }}"
            export MAINTENANCE_SECRET="${{ secrets.MAINTENANCE_SECRET }}"
            export ADMINER_ALLOWED_IPS="${{ secrets.ADMINER_ALLOWED_IPS }}"
            export CMS_API_URL="${{ secrets.CMS_API_URL }}"
            export CMS_API_KEY="${{ secrets.CMS_API_KEY }}"

            # Change to project directory and update code (including scripts)
            cd "$PROJECT_PATH"
            git fetch origin staging
            git reset --hard origin/staging
            git clean -fd

            # Now run the deployment script
            chmod +x .github/scripts/deploy-staging.sh
            ./.github/scripts/deploy-staging.sh

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: PRODUCTION
    concurrency: 
      group: production_deployment
      cancel-in-progress: false
    
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            # App environment variables
            export PROJECT_PATH="${{ secrets.PATH }}/ruby"
            export BACKUP_DIR="${{ secrets.BACKUP_PATH }}/site/production"
            export APP_ENV="${{ vars.APP_ENV || 'production' }}"
            export APP_DEBUG="${{ vars.APP_DEBUG || 'false' }}"
            export APP_URL="${{ vars.APP_URL || 'http://ruby.ideact-server.nl' }}"
            export DB_DATABASE="${{ vars.DB_DATABASE || 'ruby_production' }}"
            export QUEUE_CONNECTION="${{ vars.QUEUE_CONNECTION || 'database' }}"
            export LOG_LEVEL="${{ vars.LOG_LEVEL || 'error' }}"
            export MAINTENANCE_SECRET="${{ secrets.MAINTENANCE_SECRET }}"
            export ADMINER_ALLOWED_IPS="${{ secrets.ADMINER_ALLOWED_IPS }}"
            export CMS_API_URL="${{ secrets.CMS_API_URL }}"
            export CMS_API_KEY="${{ secrets.CMS_API_KEY }}"

            # Database credentials (used by backup-production.sh)
            # DB_DATABASE already exported above via vars.DB_DATABASE
            export DB_HOST="${{ vars.DB_HOST || '127.0.0.1' }}"
            export DB_PORT="${{ vars.DB_PORT || '3306' }}"
            export DB_USERNAME="${{ secrets.DB_USERNAME }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"

            # DB backup destination on this server
            # Copy 1: local $BACKUP_PATH/database/production/ (on Hetzner server)
            # Copy 2: Plesk1 remote server
            export LOCAL_BACKUP_DIR="${{ secrets.BACKUP_PATH }}/database/production"
            export BACKUP_PLESK_HOST="${{ vars.BACKUP_PLESK_HOST }}"
            export BACKUP_PLESK_USER="${{ vars.BACKUP_PLESK_USER }}"
            export BACKUP_PLESK_PATH="${{ vars.BACKUP_PLESK_PATH }}"

            # Change to project directory and update code (including scripts)
            cd "$PROJECT_PATH"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # Now run the deployment script
            chmod +x .github/scripts/deploy-production.sh
            ./.github/scripts/deploy-production.sh
