name: CI

on:
  push:
    branches:
      - main
      - staging
      - development
      - "feature/*"
  pull_request:
    branches:
      - main
      - staging
      - development
      - "feature/*"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - name: Run PHPStan (Static Analysis on app/)
        run: composer stan
        env:
          APP_ENV: testing
      - name: Run Laravel Pint (Code Style on app/ config/)
        run: composer lint
      - name: Run Laravel Tests (Feature & Unit)
        run: php artisan test --env=testing
        env:
          APP_ENV: testing
