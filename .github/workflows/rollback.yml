name: Manual Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        type: choice
        options:
          - staging
          - production
      backup_name:
        description: 'Specific backup name (leave empty for latest)'
        required: false
        type: string
        placeholder: 'e.g., ruby-staging-backup-20240926_123456'
      force_production:
        description: 'Force production rollback (required for production)'
        required: false
        type: boolean
        default: false

jobs:
  list-backups:
    name: List Available Backups
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.event.inputs.environment == 'staging' && 'STAGING' || 'PRODUCTION' }}
    steps:
      - name: List Available Backups
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            # Set environment variables
            export PROJECT_PATH="${{ secrets.PATH }}/${{ github.event.inputs.environment == 'staging' && 'ruby-staging' || 'ruby' }}"
            export BACKUP_DIR="${{ secrets.PATH }}/${{ github.event.inputs.environment == 'staging' && 'ruby_staging_backups' || 'ruby_backups' }}"
            export MAINTENANCE_SECRET="${{ secrets.MAINTENANCE_SECRET }}"
            
            # Run list command
            cd "$PROJECT_PATH"
            chmod +x .github/scripts/rollback-${{ github.event.inputs.environment }}.sh
            ./.github/scripts/rollback-${{ github.event.inputs.environment }}.sh --list

  rollback:
    name: Rollback ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: list-backups
    environment: 
      name: ${{ github.event.inputs.environment == 'staging' && 'STAGING' || 'PRODUCTION' }}
    steps:
      - name: Validate Production Rollback
        if: github.event.inputs.environment == 'production' && github.event.inputs.force_production != 'true'
        run: |
          echo "❌ Production rollback requires force_production to be checked"
          echo "This is a safety measure to prevent accidental production rollbacks"
          exit 1
          
      - name: Perform Rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            # Set environment variables
            export PROJECT_PATH="${{ secrets.PATH }}/${{ github.event.inputs.environment == 'staging' && 'ruby-staging' || 'ruby' }}"
            export BACKUP_DIR="${{ secrets.PATH }}/${{ github.event.inputs.environment == 'staging' && 'ruby_staging_backups' || 'ruby_backups' }}"
            export BACKUP_NAME="${{ github.event.inputs.backup_name }}"
            export MAINTENANCE_SECRET="${{ secrets.MAINTENANCE_SECRET }}"
            export FORCE_ROLLBACK="${{ github.event.inputs.force_production == 'true' && 'true' || 'false' }}"
            
            # Run rollback script
            cd "$PROJECT_PATH"
            chmod +x .github/scripts/rollback-${{ github.event.inputs.environment }}.sh
            
            if [ -n "$BACKUP_NAME" ]; then
              ./.github/scripts/rollback-${{ github.event.inputs.environment }}.sh --backup "$BACKUP_NAME" ${{ github.event.inputs.force_production == 'true' && '--force' || '' }}
            else
              ./.github/scripts/rollback-${{ github.event.inputs.environment }}.sh ${{ github.event.inputs.force_production == 'true' && '--force' || '' }}
            fi

  verify-rollback:
    name: Verify Rollback
    runs-on: ubuntu-latest
    needs: rollback
    if: always() && needs.rollback.result == 'success'
    environment: 
      name: ${{ github.event.inputs.environment == 'staging' && 'STAGING' || 'PRODUCTION' }}
    steps:
      - name: Verify Application Status
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            PROJECT_PATH="${{ secrets.PATH }}/${{ github.event.inputs.environment == 'staging' && 'ruby-staging' || 'ruby' }}"
            APP_URL="${{ github.event.inputs.environment == 'staging' && 'http://ruby-staging.ideact-server.nl' || 'http://ruby.ideact-server.nl' }}"
            
            cd "$PROJECT_PATH"
            
            echo "🔍 Verifying rollback status..."
            
            # Check if application is up
            if php artisan --version > /dev/null 2>&1; then
              echo "✅ Laravel application is responsive"
            else
              echo "❌ Laravel application is not responding"
              exit 1
            fi
            
            # Check database connection
            if php artisan migrate:status > /dev/null 2>&1; then
              echo "✅ Database connection is working"
            else
              echo "⚠️ Database connection issue detected"
            fi
            
            # Check if maintenance mode is disabled
            if [ ! -f "storage/framework/down" ]; then
              echo "✅ Maintenance mode is disabled"
            else
              echo "⚠️ Application is still in maintenance mode"
            fi
            
            # Show current git status
            echo "📊 Current git status:"
            git log --oneline -n 3 || echo "Git status unavailable"
            
            echo "🌐 Application URL: $APP_URL"
            echo "🎉 Rollback verification completed"
