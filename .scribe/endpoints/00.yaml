    uri: api/v1/register
    metadata:
      groupName: Auth
      groupDescription: |-

        Authentication and user management endpoints.
      subgroup: ''
      subgroupDescription: ''
      title: 'Register a new user.'
      description: 'Registers a user with a registration number, PIN, and agreement to share data for research.'
      authenticated: false
      custom: []
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      registration_number:
        name: registration_number
        description: 'The unique registration number for the user.'
        required: true
        example: user123
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
      pin:
        name: pin
        description: 'The PIN code for mobile login (min 6 chars).'
        required: true
        example: '123456'
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
      opt_in_for_research:
        name: opt_in_for_research
        description: 'Must be true to register.'
        required: true
        example: true
        type: boolean
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
    cleanBodyParameters:
      registration_number: user123
      pin: '123456'
      opt_in_for_research: true
    fileParameters: []
    responses:
      -
        status: 201
        content: |-
          {
            "success": true,
            "message": "Registration successful",
            "data": {
              "user": { "id": 1, "registration_number": "user123", ... },
              "access_token": "1|abcdef..."
            }
          }
        headers: []
        description: ''
        custom: []
      -
        status: 400
        content: |-
          {
            "success": false,
            "message": "Registration failed: <error message>",
            "data": null
          }
        headers: []
        description: ''
        custom: []
    responseFields:
      success:
        name: success
        description: 'Whether the request was successful'
        required: false
        example: null
        type: boolean
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      message:
        name: message
        description: 'A human-readable message'
        required: false
        example: null
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      data:
        name: data
        description: 'The user and access token or null'
        required: false
        example: null
        type: object|null
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
    auth: []
    controller: null
    method: null
    route: null
